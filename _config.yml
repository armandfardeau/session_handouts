# Site
lang: fr
name: 'Mes fiches séances'
description: "Trouvez des fiches de séance de voile légère prêtes à l'emploi. Exercices, parcours pédagogiques et sécurité pour moniteurs de voile (niveaux FFV 1 à 5)."
logo: 'assets/images/logo.png'
favicon: 'assets/images/favicon.ico'
baseurl: '/mundana-theme-jekyll'
disqus: 'mes-fiches-seances'
#email: 'wowthemesnet@gmail.com'
#mailchimp-list: 'https://wowthemes.us11.list-manage.com/subscribe/post?u=8aeb20a530e124561927d3bd8&amp;id=8c3d2d214b'

include: ["_pages"]
permalink: /:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-seo-tag

authors:
    armand:
      name:           Armand Fardeau
      site:           ""
      avatar:         assets/images/author.jpg
      bio:            "Moniteur de voile FFVoile | Créateur de fiches pédagogiques"
      email:          fakemail@gmail.com
      twitter:        ""
 
# Defaults
defaults:

  # all posts
  - scope:
      path: "_posts"
    values:
      layout: post
      author: armand
      avatar: assets/images/author.jpg
      
  # all pages
  - scope:
      path: "_pages"
    values:
      layout: page
      
# Syntax
markdown: kramdown
highlighter: rouge

# Paginate
paginate: 10



# Exclude metadata and development time dependencies (like Grunt plugins)
exclude: [README.markdown, package.json, grunt.js, Gruntfile.js, Gruntfile.coffee, node_modules]